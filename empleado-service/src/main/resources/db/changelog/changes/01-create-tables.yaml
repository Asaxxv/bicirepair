databaseChangeLog:
  - changeSet:
      id: 1
      author: bicirepair
      changes:
        - createTable:
            tableName: empleado
            columns:
              - column:
                  name: id_empleado
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nombre_emp
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: correo_emp
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: telefono_emp
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: cargo_emp
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: fecha_ingreso_emp
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: rut_emp
                  type: VARCHAR(12)
                  constraints:
                    nullable: false
                    unique: true