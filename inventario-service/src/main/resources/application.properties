spring.application.name=inventario-service
server.port=8089

spring.datasource.url=jdbc:mysql://localhost:3306/bd_inventario?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.jpa.show-sql=true

logging.file.name=logs/inventario-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

api.producto.base-url=http://localhost:8085
api.producto.exists=/productos/%d/exists

api.proveedor.base-url=http://localhost:8088
api.proveedor.exists=/proveedores/%d/exists