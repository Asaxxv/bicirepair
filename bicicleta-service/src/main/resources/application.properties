spring.application.name=bicicleta-service
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/bd_bicicleta?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
api.bicicleta.base-url=http://localhost:8084
api.bicicleta.exists=/bicicletas/%d/exists
