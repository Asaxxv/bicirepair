databaseChangeLog:
  - changeSet:
      id: 1
      author: bicirepair
      changes:
        - createTable:
            tableName: facturacion
            columns:
              - column:
                  name: id_factura
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: id_reparacion
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: cobro_total
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: metodo_pago
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: fecha_factura
                  type: DATE
                  constraints:
                    nullable: false