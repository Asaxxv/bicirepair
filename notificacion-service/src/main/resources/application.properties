spring.application.name=notificacion-service
server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3306/bd_notificacion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.jpa.show-sql=true

logging.file.name=logs/notificacion-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

api.reparacion.base-url=http://localhost:8086
api.reparacion.exists=/reparaciones/%d/exists