spring.application.name=api-gateway
server.port=8080

spring.cloud.gateway.server.webmvc.routes[0].id=cliente-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/clientes/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=RewritePath=/api/clientes/(?<segment>.*), /clientes/${segment}

