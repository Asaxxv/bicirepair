databaseChangeLog:
  - changeSet:
      id: 1
      author: bicirepair
      changes:
        - createTable:
            tableName: reparacion
            columns:
              - column:
                  name: id_reparacion
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: id_bicicleta
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: id_empleado
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: descripcion_reparacion
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: costo_total
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: fecha_reparacion
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: estado_reparacion
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
        - createTable:
            tableName: detalle_reparacion
            columns:
              - column:
                  name: id_detalle
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: id_reparacion
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: id_producto
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: cantidad
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: precio_unitario
                  type: INT
                  constraints:
                    nullable: false