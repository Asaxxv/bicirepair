spring.application.name=reparacion-service
server.port=8086

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bd_reparacion?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml
spring.jpa.show-sql=true

logging.file.name=logs/reparacion-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

api.bicicleta.base-url=${API_BICICLETA_BASE_URL:http://localhost:8084}
api.bicicleta.exists=/bicicletas/%d/exists

api.empleado.base-url=${API_EMPLEADO_BASE_URL:http://localhost:8082}
api.empleado.exists=/empleados/%d/exists