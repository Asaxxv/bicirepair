spring.application.name=reparacion-service
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/bd_reparacion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.file.name=logs/reparacion-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

api.bicicleta.base-url=http://localhost:8084
api.bicicleta.exists=/bicicletas/%d/exists

api.empleado.base-url=http://localhost:8082
api.empleado.exists=/empleados/%d/exists